  <script>
  (function(){
    'use strict';
    var bank=JSON.parse(document.getElementById('question-data').textContent).questions.filter(function(q){return q.active;});

      {code:'DER106',label:'DER 106',name:'Historia y Filosofía del Derecho',icon:'history'},
      {code:'C10',label:'C10',name:'Investigación',icon:'search'}

    subjects.forEach(function(s){s.total=bank.filter(function(q){return q.subject_code===s.code;}).length;});
    var state={screen:'home',subject:null,questions:[],index:0,answers:{},submitted:{},seconds:0,paused:false,tips:true,feedback:true,font:'medium',theme:'light',timer:null,dragIndex:null,dragMatch:null};

      branch:'<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="5" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="18" cy="18" r="2"/><path d="M6 7v5a6 6 0 0 0 6 6h4M8 5h4a6 6 0 0 1 6 6v5"/></svg>',
      landmark:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 10 9-6 9 6M5 10v8M9 10v8M15 10v8M19 10v8M3 18h18M2 22h20"/></svg>',
      pen:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4zM14 6l3 3"/></svg>',
      history:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5M12 7v5l3 2"/></svg>',

    var root=document.getElementById('app');
    function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function shuffle(items){var a=items.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
    function attempts(){try{return JSON.parse(localStorage.getItem('simulador-derecho-intentos')||'[]');}catch(e){return [];}}
    function saveAttempt(a){localStorage.setItem('simulador-derecho-intentos',JSON.stringify([a].concat(attempts()).slice(0,20)));}
    function activeAttempt(){try{return JSON.parse(localStorage.getItem('simulador-derecho-activo')||'null');}catch(e){localStorage.removeItem('simulador-derecho-activo');return null;}}
    function persistActive(paused){if(!state.subject||!state.questions.length)return;localStorage.setItem('simulador-derecho-activo',JSON.stringify({subjectCode:state.subject.code,questionIds:state.questions.map(function(q){return q.id;}),index:state.index,answers:state.answers,submitted:state.submitted,seconds:state.seconds,paused:paused==null?state.paused:paused,tips:state.tips,feedback:state.feedback,font:state.font,theme:state.theme}));}
    function setBody(){document.body.className=(state.theme==='dusk'?'dusk ':'')+(state.font==='small'?'font-small':state.font==='large'?'font-large':'');}
    function formatTime(v){return String(Math.floor(v/60)).padStart(2,'0')+':'+String(v%60).padStart(2,'0');}
    function renderHome(){
      clearTimer();setBody();var hist=attempts();var active=activeAttempt();var activeSubject=active&&subjects.find(function(s){return s.code===active.subjectCode;});
      root.innerHTML='<header class="top"><div class="title"><h1>Simulador de examen final</h1><p>Carrera de Derecho</p></div></header><main class="home"><div class="intro">El cronómetro registra cuánto tardas y no cierra el intento automáticamente.</div>'+(active&&activeSubject?'<section class="resume-box"><span><small>Intento guardado</small><strong>'+esc(activeSubject.name)+'</strong><em>Pregunta '+(active.index+1)+' · '+formatTime(active.seconds)+' empleados</em></span><div class="resume-actions"><button class="btn primary" id="resumeBtn">Continuar donde quedé</button><button class="btn" id="closeSavedBtn">Cerrar intento</button></div></section>':'')+'<section class="subjects">'+subjects.map(function(s){return '<button class="subject" data-subject="'+s.code+'">'+icons[s.icon]+'<span><small>Banco de práctica</small><strong>'+esc(s.name)+'</strong><em>'+s.total+' preguntas disponibles</em></span><span class="arrow">›</span></button>';}).join('')+'</section><section class="history"><span class="history-label">Intentos recientes</span><div class="attempts">'+(hist.length?hist.slice(0,6).map(function(a){return '<span class="attempt-chip">'+esc(a.subject)+' · <b>'+a.percentage+'%</b></span>';}).join(''):'<span class="history-label">Todavía no hay resultados guardados.</span>')+'</div></section></main>';
      root.querySelectorAll('[data-subject]').forEach(function(btn){btn.onclick=function(){openCount(btn.dataset.subject);};});
      var resume=document.getElementById('resumeBtn');if(resume)resume.onclick=resumeExam;var closeSaved=document.getElementById('closeSavedBtn');if(closeSaved)closeSaved.onclick=closeExam;
    }
    function openCount(code){
      var s=subjects.find(function(x){return x.code===code;});var choices=[10,20,30,s.total].filter(function(v,i,a){return v<=s.total&&a.indexOf(v)===i;});
      var wrap=document.createElement('div');wrap.className='overlay';wrap.innerHTML='<section class="dialog" role="dialog" aria-modal="true" aria-label="Configurar intento"><button class="close" aria-label="Cerrar">×</button><small>Configurar intento</small><h2>'+esc(s.name)+'</h2><p>Elige cuántas preguntas tendrá este intento.</p><div class="counts">'+choices.map(function(n){return '<button data-count="'+n+'"><strong>'+n+'</strong><span>preguntas</span></button>';}).join('')+'</div></section>';
      document.body.appendChild(wrap);wrap.querySelector('.close').onclick=function(){wrap.remove();};wrap.onclick=function(e){if(e.target===wrap)wrap.remove();};wrap.querySelectorAll('[data-count]').forEach(function(b){b.onclick=function(){wrap.remove();startExam(s,Number(b.dataset.count));};});
    }
    function startExam(subject,count){
      localStorage.removeItem('simulador-derecho-activo');state.subject=subject;state.questions=shuffle(bank.filter(function(q){return q.subject_code===subject.code;})).slice(0,count);state.index=0;state.answers={};state.submitted={};state.seconds=0;state.paused=false;state.screen='exam';
      state.questions.forEach(function(q){if(q.question_type==='ordering')state.answers[q.id]=shuffle(q.answer.ordered_items);});
      startTimer();renderExam();
    }
    function startTimer(){clearTimer();if(state.paused||state.screen!=='exam')return;state.timer=setInterval(function(){state.seconds++;var clock=document.getElementById('clock');if(clock)clock.textContent=formatTime(state.seconds);persistActive();},1000);}
    function clearTimer(){if(state.timer){clearInterval(state.timer);state.timer=null;}}
    function selected(q){return state.answers[q.id];}
    function hasAnswer(q){var a=selected(q);if(q.question_type==='matching')return a&&q.answer.pairs.every(function(p){return a[p.left];});if(q.question_type==='ordering')return Array.isArray(a)&&a.length===q.answer.ordered_items.length;if(q.question_type==='multiple_choice')return Array.isArray(a)&&a.length>0;return !!a;}
    function isCorrect(q){
      var a=selected(q);
      if(['single_choice','true_false','fill_blank'].indexOf(q.question_type)>=0)return a===q.answer.option_ids[0];
      if(q.question_type==='multiple_choice')return JSON.stringify((a||[]).slice().sort())===JSON.stringify(q.answer.option_ids.slice().sort());
      if(q.question_type==='matching')return q.answer.pairs.every(function(p){return a&&a[p.left]===p.right;});
      if(q.question_type==='ordering')return JSON.stringify(a||[])===JSON.stringify(q.answer.ordered_items);
      return false;
    }
    function renderExam(){
      setBody();var q=state.questions[state.index];var done=!!state.submitted[q.id];persistActive();
      var answered=Object.keys(state.answers).filter(function(id){return hasAnswer(state.questions.find(function(qx){return qx.id===id;}));}).length;
      var pausedMarkup=state.paused?'<div class="pause-screen"><strong>Intento en pausa</strong><p>El cronómetro y la actividad están detenidos. Tu progreso está guardado.</p><button class="btn primary" id="continueOverlay">Continuar intento</button></div>':'';
      root.innerHTML='<section class="exam"><header class="exam-head"><button class="exam-brand" id="homeBtn"><strong>Simulador de examen final</strong><small>Carrera de Derecho</small></button><div class="identity"><small>Asignatura</small><strong>'+esc(state.subject.name)+'</strong></div><div class="tools"><div class="toolset"><button data-font="small" class="'+(state.font==='small'?'active':'')+'">A</button><button data-font="medium" class="'+(state.font==='medium'?'active':'')+'">A</button><button data-font="large" class="'+(state.font==='large'?'active':'')+'">A</button></div><button class="theme-btn" id="themeBtn">'+(state.theme==='light'?'Tema azul':'Tema claro')+'</button><div class="clock"><small>'+(state.paused?'Cronómetro pausado':'Tiempo empleado')+'</small><strong id="clock">'+formatTime(state.seconds)+'</strong></div></div></header><div class="progress"><span style="width:'+(((state.index+1)/state.questions.length)*100)+'%"></span></div><div class="exam-main"><aside class="side"><div class="side-title"><strong>Preguntas</strong><span>'+answered+'/'+state.questions.length+'</span></div><div class="qgrid">'+state.questions.map(function(item,i){return '<button data-index="'+i+'" class="'+(i===state.index?'current ':'')+(hasAnswer(item)?'answered':'')+'">'+(i+1)+'</button>';}).join('')+'</div><div class="session"><label><input id="tipsToggle" type="checkbox" '+(state.tips?'checked':'')+'> Consejos</label><label><input id="feedbackToggle" type="checkbox" '+(state.feedback?'checked':'')+'> Retroalimentación</label></div><div class="attempt-controls"><button class="attempt-control" id="pauseBtn">'+(state.paused?'Continuar intento':'Pausar intento')+'</button><button class="attempt-control" id="saveExitBtn">Guardar y salir</button><button class="attempt-control finish" id="finishSideBtn">Terminar y ver resultado</button><button class="attempt-control close-attempt" id="closeAttemptBtn">Cerrar intento</button></div></aside><article class="panel">'+pausedMarkup+'<div class="labels"><span>'+esc(q.topic||'Práctica')+'</span><span>Pregunta '+(state.index+1)+' de '+state.questions.length+'</span></div><h1 class="prompt">'+esc(q.prompt)+'</h1>'+(state.tips&&q.tip?'<details class="tip"><summary>Consejo disponible</summary><p>'+esc(q.tip)+'</p></details>':'')+'<div id="answerArea">'+answerMarkup(q,done)+'</div>'+(done&&state.feedback?feedbackMarkup(q):'')+'<div class="actions"><button class="btn" id="prevBtn" '+(state.index===0?'disabled':'')+'>Anterior</button><div class="actions-right">'+(!done?'<button class="btn primary" id="submitBtn" '+(!hasAnswer(q)?'disabled':'')+'>Comprobar</button>':'')+(state.index===state.questions.length-1?'<button class="btn primary" id="finishBtn">Finalizar intento</button>':'<button class="btn primary" id="nextBtn">Siguiente</button>')+'</div></div></article></div></section>';
      bindExam(q,done);
    }
    function answerMarkup(q,done){
      if(['single_choice','true_false','fill_blank','multiple_choice'].indexOf(q.question_type)>=0){var multi=q.question_type==='multiple_choice';var a=selected(q);return '<div class="options">'+q.options.map(function(o){var chosen=multi?Array.isArray(a)&&a.indexOf(o.id)>=0:a===o.id;var cls=chosen?' selected':'';if(done&&q.answer.option_ids.indexOf(o.id)>=0)cls+=' right';else if(done&&chosen)cls+=' wrong';return '<button class="option'+cls+'" data-option="'+esc(o.id)+'" '+(done?'disabled':'')+'><span class="letter">'+esc(o.id)+'</span><span class="text">'+esc(o.text)+'</span></button>';}).join('')+'</div>';}
      if(q.question_type==='matching'){var map=selected(q)||{};var rights=shuffle(q.answer.pairs.map(function(p){return p.right;}));return '<div class="matching">'+(!done?'<div class="match-bank">'+rights.map(function(r){return '<span class="match-token" draggable="true" data-match-token="'+esc(r)+'">'+esc(r)+'</span>';}).join('')+'</div>':'')+q.answer.pairs.map(function(p){return '<div class="match-row"><span class="match-left">'+esc(p.left)+'</span><span class="match-arrow">→</span><div class="match-choice"><div class="match-drop '+(map[p.left]?'filled':'')+'" data-drop-left="'+esc(p.left)+'">'+esc(map[p.left]||'Arrastra aquí una opción')+'</div><select data-match="'+esc(p.left)+'" '+(done?'disabled':'')+'><option value="">También puedes seleccionar…</option>'+rights.map(function(r){return '<option value="'+esc(r)+'" '+(map[p.left]===r?'selected':'')+'>'+esc(r)+'</option>';}).join('')+'</select></div></div>';}).join('')+'</div>';}
      if(q.question_type==='ordering'){var items=selected(q)||[];return '<div class="ordering">'+items.map(function(item,i){return '<div class="order-item" draggable="'+(!done)+'" data-order="'+i+'"><span class="order-num">'+(i+1)+'</span><span class="order-text">'+esc(item)+'</span><span class="order-actions"><button data-up="'+i+'" '+(done||i===0?'disabled':'')+' aria-label="Subir">↑</button><button data-down="'+i+'" '+(done||i===items.length-1?'disabled':'')+' aria-label="Bajar">↓</button></span></div>';}).join('')+'</div>';}
      return '<p>No se puede mostrar este tipo de pregunta.</p>';
    }
    function answerText(q,value){if(!value)return 'Sin respuesta';if(typeof value==='string'){var option=q.options.find(function(o){return o.id===value;});return option?option.id+'. '+option.text:value;}if(Array.isArray(value)){if(q.question_type==='ordering')return value.join(' → ');return value.map(function(id){var option=q.options.find(function(o){return o.id===id;});return option?option.id+'. '+option.text:id;}).join(' · ');}return Object.keys(value).map(function(left){return left+' → '+value[left];}).join(' · ');}
    function correctText(q){if(q.question_type==='ordering')return q.answer.ordered_items.join(' → ');if(q.question_type==='matching')return q.answer.pairs.map(function(p){return p.left+' → '+p.right;}).join(' · ');return q.answer.option_ids.map(function(id){var option=q.options.find(function(o){return o.id===id;});return option?option.id+'. '+option.text:id;}).join(' · ');}
    function feedbackMarkup(q){var ok=isCorrect(q);var chosen=selected(q);var reason=!ok&&typeof chosen==='string'&&q.why_options_are_wrong&&q.why_options_are_wrong[chosen]?q.why_options_are_wrong[chosen]:q.feedback_incorrect;return '<div class="feedback '+(ok?'good':'bad')+'"><b>'+(ok?'✓ ¡Correcto!':'× Esta vez no es correcto.')+'</b>'+(!ok?'<p class="answer-line"><b>Tu respuesta:</b> '+esc(answerText(q,chosen))+'</p>':'')+'<p class="answer-line"><b>Respuesta correcta:</b> '+esc(correctText(q))+'</p><p><b>Por qué:</b> '+esc(q.explanation||q.feedback_correct)+'</p>'+(!ok?'<p><b>Por qué no corresponde:</b> '+esc(reason)+'</p>':'')+((q.memory_key||q.tip)?'<p class="memory"><b>Para recordar:</b> '+esc(q.memory_key||q.tip)+'</p>':'')+(q.common_confusion?'<p><b>No confundir:</b> '+esc(q.common_confusion)+'</p>':'')+'</div>';}
    function bindExam(q,done){
      document.getElementById('homeBtn').onclick=saveAndExit;document.getElementById('themeBtn').onclick=function(){state.theme=state.theme==='light'?'dusk':'light';renderExam();};
      document.getElementById('pauseBtn').onclick=togglePause;document.getElementById('saveExitBtn').onclick=saveAndExit;document.getElementById('finishSideBtn').onclick=finishExam;document.getElementById('closeAttemptBtn').onclick=closeExam;var continueOverlay=document.getElementById('continueOverlay');if(continueOverlay)continueOverlay.onclick=togglePause;
      if(state.paused)return;
      root.querySelectorAll('[data-font]').forEach(function(b){b.onclick=function(){state.font=b.dataset.font;renderExam();};});root.querySelectorAll('[data-index]').forEach(function(b){b.onclick=function(){state.index=Number(b.dataset.index);renderExam();};});
      document.getElementById('tipsToggle').onchange=function(e){state.tips=e.target.checked;renderExam();};document.getElementById('feedbackToggle').onchange=function(e){state.feedback=e.target.checked;renderExam();};
      root.querySelectorAll('[data-option]').forEach(function(b){b.onclick=function(){if(done)return;if(q.question_type==='multiple_choice'){var arr=Array.isArray(selected(q))?selected(q).slice():[];var pos=arr.indexOf(b.dataset.option);if(pos>=0)arr.splice(pos,1);else arr.push(b.dataset.option);state.answers[q.id]=arr;}else state.answers[q.id]=b.dataset.option;renderExam();};});
      root.querySelectorAll('[data-match]').forEach(function(s){s.onchange=function(){var map=selected(q)||{};map=Object.assign({},map);map[s.dataset.match]=s.value;state.answers[q.id]=map;renderExam();};});
      root.querySelectorAll('[data-match-token]').forEach(function(token){token.ondragstart=function(){state.dragMatch=token.dataset.matchToken;};});root.querySelectorAll('[data-drop-left]').forEach(function(zone){zone.ondragover=function(e){e.preventDefault();};zone.ondrop=function(e){e.preventDefault();if(!state.dragMatch)return;var map=Object.assign({},selected(q)||{});map[zone.dataset.dropLeft]=state.dragMatch;state.answers[q.id]=map;state.dragMatch=null;renderExam();};});
      root.querySelectorAll('[data-up]').forEach(function(b){b.onclick=function(){moveOrder(q,Number(b.dataset.up),-1);};});root.querySelectorAll('[data-down]').forEach(function(b){b.onclick=function(){moveOrder(q,Number(b.dataset.down),1);};});
      root.querySelectorAll('[data-order]').forEach(function(row){row.ondragstart=function(){state.dragIndex=Number(row.dataset.order);row.classList.add('dragging');};row.ondragend=function(){row.classList.remove('dragging');};row.ondragover=function(e){e.preventDefault();};row.ondrop=function(e){e.preventDefault();var to=Number(row.dataset.order);if(state.dragIndex!==null&&state.dragIndex!==to){var items=selected(q).slice();var moved=items.splice(state.dragIndex,1)[0];items.splice(to,0,moved);state.answers[q.id]=items;state.dragIndex=null;renderExam();}};});
      var submit=document.getElementById('submitBtn');if(submit)submit.onclick=function(){state.submitted[q.id]=true;renderExam();};var prev=document.getElementById('prevBtn');if(prev)prev.onclick=function(){state.index--;renderExam();};var next=document.getElementById('nextBtn');if(next)next.onclick=function(){state.index++;renderExam();};var finish=document.getElementById('finishBtn');if(finish)finish.onclick=finishExam;
    }
    function moveOrder(q,index,delta){var items=selected(q).slice();var next=index+delta;if(next<0||next>=items.length)return;var t=items[index];items[index]=items[next];items[next]=t;state.answers[q.id]=items;renderExam();}
    function togglePause(){state.paused=!state.paused;if(state.paused)clearTimer();else startTimer();renderExam();}
    function saveAndExit(){state.paused=true;persistActive(true);state.screen='home';renderHome();}
    function resumeExam(){var a=activeAttempt();if(!a)return;var subject=subjects.find(function(s){return s.code===a.subjectCode;});var byId={};bank.forEach(function(q){byId[q.id]=q;});var questions=a.questionIds.map(function(id){return byId[id];}).filter(Boolean);if(!subject||questions.length!==a.questionIds.length){localStorage.removeItem('simulador-derecho-activo');renderHome();return;}state.subject=subject;state.questions=questions;state.index=Math.min(a.index,questions.length-1);state.answers=a.answers||{};state.submitted=a.submitted||{};state.seconds=a.seconds||0;state.paused=false;state.tips=a.tips!==false;state.feedback=a.feedback!==false;state.font=a.font||'medium';state.theme=a.theme||'light';state.screen='exam';startTimer();renderExam();}
    function closeExam(){if(!confirm('¿Cerrar este intento? Se perderán el progreso y las respuestas guardadas.'))return;clearTimer();localStorage.removeItem('simulador-derecho-activo');state.subject=null;state.questions=[];state.answers={};state.submitted={};state.seconds=0;state.paused=false;state.screen='home';renderHome();}
    function finishExam(){
      if(state.screen!=='exam')return;clearTimer();localStorage.removeItem('simulador-derecho-activo');var score=state.questions.filter(isCorrect).length;var pct=Math.round(score/state.questions.length*100);var a={id:Date.now(),subject:state.subject.name,score:score,total:state.questions.length,percentage:pct,durationSeconds:state.seconds,date:new Date().toLocaleString('es-EC')};saveAttempt(a);state.result=a;state.screen='results';renderResults();
    }
    function renderResults(){setBody();var a=state.result;root.innerHTML='<main class="results"><section class="result-card"><small>Intento finalizado</small><h1>'+esc(a.subject)+'</h1><div class="score-circle"><strong>'+a.percentage+'%</strong><span>'+a.score+' de '+a.total+' correctas</span></div><p>Completaste el intento en <b>'+formatTime(a.durationSeconds)+'</b>. El resultado quedó guardado únicamente en este navegador.</p><div class="result-actions"><button class="btn" id="homeResult">Volver al inicio</button><button class="btn primary" id="repeatResult">Nuevo intento</button></div></section></main>';document.getElementById('homeResult').onclick=function(){state.screen='home';renderHome();};document.getElementById('repeatResult').onclick=function(){openCount(state.subject.code);};}
    renderHome();
  })();
  </script>
</body>
